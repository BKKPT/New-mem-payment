<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bangkok ParTee</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: url('https://bkkpt.github.io/New-mem-payment/B35F50FC-CD71-4BC9-BC30-12277865EDA9.png') no-repeat center;
  background-size: contain;
  background-color: #000;
}

.overlay {
  position:fixed;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(4px);
}

.popup-box {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#fff;
  padding:25px;
  border-radius:20px;
  text-align:center;
  width:90%;
  max-width:380px;
  box-shadow:0 0 40px rgba(255,215,0,0.6);
}

.logo {
  width:90px;
  margin-bottom:10px;
}

.title {
  color:#c9a63b;
  font-size:22px;
  font-weight:bold;
}

.subtitle {
  color:#666;
  margin-bottom:15px;
}

/* plans */
.plan {
  padding:15px;
  margin:12px 0;
  border-radius:15px;
  color:white;
}

/* 179 GOLD */
.gold {
  background: linear-gradient(135deg,#f7d774,#c9a63b);
  color:black;
  box-shadow:0 0 15px rgba(255,215,0,0.8);
}

/* 399 GREEN */
.green {
  background: linear-gradient(135deg,#1c8f5a,#0f5f3c);
}

/* 999 BLUE */
.blue {
  background: linear-gradient(135deg,#2c6ed5,#163c7a);
}

.price {
  font-size:20px;
  font-weight:bold;
  margin:5px 0;
}

.limited {
  font-size:12px;
  color:#ff3b3b;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.btn-gold { background:#000; color:#fff; }
.btn-green { background:#ffd700; color:black; }
.btn-blue { background:#ffd700; color:black; }

.footer {
  margin-top:10px;
  font-size:12px;
  color:#999;
}
</style>

</head>

<body>

<div class="overlay">

  <div class="popup-box">

    <img class="logo" src="https://bkkpt.github.io/New-mem-payment/3D2CC324-3217-48CD-87E5-270CB9BDD5B4.png">

    <div class="title">GRAND OPENING</div>
    <div class="subtitle">Choose Your Membership</div>

    <!-- 179 -->
    <div class="plan gold">
      <div>1 Month</div>
      <div class="price">179 THB</div>
      <div class="limited">🔥 Limited Offer — Only 10 Members<br>Valid until 31 May 2026</div>
      <button class="btn-gold" onclick="pay179()">Pay Now</button>
    </div>

    <!-- 399 -->
    <div class="plan green">
      <div>3 Months ⭐</div>
      <div class="price">399 THB</div>
      <button class="btn-green" onclick="pay399()">Pay Now</button>
    </div>

    <!-- 999 -->
    <div class="plan blue">
      <div>12 Months</div>
      <div class="price">999 THB</div>
      <button class="btn-blue" onclick="pay999()">Pay Now</button>
    </div>

    <div class="footer">⚠ Only 30 Members Available</div>

  </div>

</div>

<script>
function pay179() {
  window.location.href = "https://buy.stripe.com/00w4gAcb56KlbWq2TCbo403";
}

function pay399() {
  window.location.href = "https://buy.stripe.com/9B67sMa2Xb0BgcGam4bo400";
}

function pay999() {
  window.location.href = "https://buy.stripe.com/7sY5kEgrl8St6C6eCkbo401";
}
</script>

</body>
</html>
