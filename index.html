<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bangkok ParTee</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: url('https://bkkpt.github.io/New-mem-payment/B35F50FC-CD71-4BC9-BC30-12277865EDA9.png') no-repeat center center;
  background-size: cover;
}

/* overlay */
.overlay {
  position:fixed;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.75);
}

/* popup */
.popup-box {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background: linear-gradient(145deg,#0d3b2e,#0a2a22);
  padding:30px;
  border-radius:20px;
  text-align:center;
  width:90%;
  max-width:420px;
  border:2px solid gold;
  box-shadow:0 0 40px gold;
}

/* logo */
.logo {
  width:120px;
  margin-bottom:10px;
}

/* title */
.title {
  color:gold;
  font-size:28px;
  margin-bottom:5px;
}

.subtitle {
  color:#ddd;
  margin-bottom:15px;
}

/* plans */
.plan {
  background: rgba(255,255,255,0.05);
  padding:15px;
  margin:12px 0;
  border-radius:12px;
}

/* 🔥 GOLD HIGHLIGHT */
.plan.gold {
  background: linear-gradient(145deg,#3a2c00,#1a1400);
  border:2px solid gold;
  box-shadow:0 0 25px rgba(255,215,0,0.6);
}

.popular {
  border:2px solid gold;
}

.price {
  font-size:24px;
  color:gold;
  font-weight:bold;
}

/* buttons */
button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.pay179 { background:linear-gradient(135deg,#c8a44d,#f5d77a); color:black; }
.pay399 { background:#ffc107; color:black; }
.pay999 { background:#dc3545; color:white; }

/* 🔥 limited text */
.limited {
  color:#ff4d4d;
  font-size:13px;
  margin-top:5px;
}

.limit {
  color:#ff4d4d;
  margin-top:12px;
}
</style>

</head>

<body>

<div class="overlay">

  <div class="popup-box">

    <!-- LOGO -->
    <img class="logo" src="https://bkkpt.github.io/New-mem-payment/3D2CC324-3217-48CD-87E5-270CB9BDD5B4.png">

    <div class="title">GRAND OPENING</div>
    <div class="subtitle">Choose Your Membership</div>

    <!-- 🔥 179 GOLD -->
    <div class="plan gold">
      <h3>1 Month</h3>
      <div class="price">179 THB</div>

      <div class="limited">
        🔥 Limited Offer — Only 10 Members<br>
        Valid until 31 May 2026
      </div>

      <button class="pay179" onclick="pay179()">Pay Now</button>
    </div>

    <!-- 399 -->
    <div class="plan popular">
      <h3>3 Months ⭐</h3>
      <div class="price">399 THB</div>
      <button class="pay399" onclick="pay399()">Pay Now</button>
    </div>

    <!-- 999 -->
    <div class="plan">
      <h3>12 Months</h3>
      <div class="price">999 THB</div>
      <button class="pay999" onclick="pay999()">Pay Now</button>
    </div>

    <p class="limit">⚠ Only 30 Members Available</p>

  </div>

</div>

<script>
// ✅ Stripe links (ใส่ให้แล้ว)
function pay179() {
  window.location.href = "https://buy.stripe.com/00w4gAcb56KlbWq2TCbo403";
}

function pay399() {
  window.location.href = "https://buy.stripe.com/9B67sMa2Xb0BgcGam4bo400";
}

function pay999() {
  window.location.href = "https://buy.stripe.com/9B67sMa2Xb0BgcGam4bo400";
}
</script>

</body>
</html>
