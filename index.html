<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
/* 🔥 RESET */
* {
  box-sizing: border-box;
}

body {
  margin:0;
  font-family: Arial, sans-serif;
  overflow:hidden; /* ล็อค scroll */
}

/* 🔥 BLUR BACKGROUND LAYER */
.bg {
  position:fixed;
  width:100%;
  height:100%;
  background: url('https://bkkpt.github.io/New-mem-payment/B35F50FC-CD71-4BC9-BC30-12277865EDA9.png') no-repeat center;
  background-size: cover;
  filter: blur(12px) brightness(0.7);
  transform: scale(1.1); /* กันขอบแตก */
}

/* 🔥 OVERLAY */
.overlay {
  position:fixed;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.25);
}

/* 🔥 POPUP */
.popup-box {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#fff;
  padding:20px;
  border-radius:20px;
  text-align:center;
  width:92%;
  max-width:380px;
  box-shadow:0 0 40px rgba(255,215,0,0.6);
}

/* LOGO */
.logo {
  width:80px;
  margin-bottom:10px;
}

/* HEADER */
.brand {
  font-size:20px;
  font-weight:bold;
  color:#c9a63b;
}

.title {
  font-size:22px;
  color:#c9a63b;
}

.subtitle {
  color:#666;
  margin-bottom:15px;
}

/* ANIMATION */
@keyframes shimmer {
  0% {background-position:-200%;}
  100% {background-position:200%;}
}

.shimmer {
  background: linear-gradient(90deg,#ffd700,#fff,#ffd700);
  background-size:200%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation: shimmer 2s infinite linear;
}

@keyframes blink {
  50% {opacity:0.3;}
}

/* PLANS */
.plan {
  padding:15px;
  margin:12px 0;
  border-radius:15px;
}

/* 179 */
.gold {
  background: linear-gradient(135deg,#f7d774,#c9a63b);
  color:black;
}

.limited {
  font-size:13px;
  font-weight:bold;
  color:#005eff;
  animation: blink 1s infinite;
}

/* 399 */
.cream {
  background:#f5f0e6;
  color:#3b5d2a;
}

/* 999 */
.elite {
  background:#000;
  color:#ffd700;
}

/* BUTTON */
button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.btn-dark { background:#000; color:white; }
.btn-green { background:#2e7d32; color:white; }
.btn-gold { background:#ffd700; color:black; }

.footer {
  font-size:12px;
  color:#999;
}
</style>

</head>

<body>

<!-- 🔥 BLUR BACKGROUND -->
<div class="bg"></div>

<!-- 🔥 DARK OVERLAY -->
<div class="overlay"></div>

<!-- 🔥 POPUP -->
<div class="popup-box">

<img class="logo" src="https://bkkpt.github.io/New-mem-payment/3D2CC324-3217-48CD-87E5-270CB9BDD5B4.png">

<div class="brand">Bangkok ParTee</div>
<div class="title">GRAND OPENING</div>
<div class="subtitle">Choose Your Membership</div>

<!-- 179 -->
<div class="plan gold">
  <div>1 Month</div>
  <div class="shimmer" style="font-size:20px;font-weight:bold;">179 THB</div>

  <div class="limited shimmer">
    ✨ Limited Offer — Only 10 Members<br>
    Valid until 31 May 2026
  </div>

  <button class="btn-dark" onclick="pay179()">Pay Now</button>
</div>

<!-- 399 -->
<div class="plan cream">
  <div>3 Months ⭐</div>
  <div style="font-size:20px;font-weight:bold;">399 THB</div>
  <button class="btn-green" onclick="pay399()">Pay Now</button>
</div>

<!-- 999 -->
<div class="plan elite">
  <div>1Year~ ELITE 💎</div>
  <div class="shimmer" style="font-size:20px;font-weight:bold;">999 THB</div>
  <button class="btn-gold" onclick="pay999()">Pay Now</button>
</div>

<div class="footer">Slots are filling up fast! Don't miss your chance tonight. 🔥 </div>

</div>

<script>
function pay179() {
  window.location.href = "https://buy.stripe.com/00w4gAcb56KlbWq2TCbo403";
}

function pay399() {
  window.location.href = "https://buy.stripe.com/9B67sMa2Xb0BgcGam4bo400";
}

function pay999() {
  window.location.href = "https://buy.stripe.com/7sY5kEgrl8St6C6eCkbo401";
}
</script>

</body>
</html>
