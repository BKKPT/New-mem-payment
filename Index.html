<style>
body {
  font-family: 'Arial', sans-serif;
}

/* 🔘 Button */
.gold-btn {
  background: linear-gradient(135deg, #b9932f, #f5d77a);
  padding: 15px 30px;
  border-radius: 30px;
  border: none;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 15px rgba(255,215,0,0.6);
}

/* 🌑 Overlay */
.popup {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(8px);
}

/* 💎 Box */
.popup-box {
  background: linear-gradient(145deg, #0d3b2e, #0a2a22);
  color:white;
  padding:40px;
  border-radius:20px;
  text-align:center;
  max-width:420px;
  margin:8% auto;
  border: 2px solid gold;
  box-shadow: 0 0 40px rgba(255,215,0,0.4);
  animation: fadeIn 0.5s ease;
}

/* ✨ Title */
.title {
  font-size:32px;
  color: gold;
  text-shadow: 0 0 10px gold;
}

.subtitle {
  margin-bottom:20px;
}

/* 💰 Price Box */
.price-box {
  background: rgba(255,215,0,0.1);
  padding:20px;
  border-radius:15px;
  margin-bottom:15px;
}

.now {
  font-size:12px;
  color:#ffcc00;
}

.price {
  font-size:48px;
  color: gold;
  font-weight:bold;
  text-shadow: 0 0 15px gold;
}

.price span {
  font-size:18px;
}

.valid {
  font-size:12px;
}

/* ⚠️ */
.limit {
  color:#ff4d4d;
  margin-bottom:15px;
}

/* 🔘 Buttons */
.btn {
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}

/* สี */
.line { background:#00c300; color:white; }
.tg { background:#0088cc; color:white; }
.stripe { background:#635bff; color:white; }

/* ❌ Close */
.close {
  margin-top:15px;
  background:none;
  color:white;
  border:none;
  font-size:18px;
  cursor:pointer;
}

/* ✨ Animation */
@keyframes fadeIn {
  from { opacity:0; transform: translateY(20px); }
  to { opacity:1; transform: translateY(0); }
}
</style>

<script>

function closePopup() {

}
